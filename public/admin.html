<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>London Uncovered Admin</title>
  <style>
    body { margin:0; font-family:Segoe UI, sans-serif; background:#f6f8fb; color:#18263d; }
    .wrap { display:grid; grid-template-columns:220px 1fr; height:100vh; }
    .side { background:#1a2b48; color:#fff; padding:16px; }
    .side button { width:100%; margin:6px 0; padding:10px; background:#1a2b48; color:#fff; border:1px solid #9aa8bc; border-radius:8px; cursor:pointer; text-align:left; }
    .side button:hover { background:#2b446a; }
    .main { padding:18px; overflow:auto; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .lang { padding:8px 12px; border:1px solid #b8c2d0; border-radius:8px; cursor:pointer; }
    .cards { display:grid; grid-template-columns:repeat(4,minmax(120px,1fr)); gap:10px; margin-bottom:14px; }
    .card { background:#fff; border:1px solid #d8dfeb; border-radius:10px; padding:10px; }
    .panel { display:none; background:#fff; border:1px solid #d8dfeb; border-radius:10px; padding:12px; }
    .panel.active { display:block; }
    table { width:100%; border-collapse:collapse; }
    th,td { border-bottom:1px solid #e5ebf4; padding:8px; font-size:13px; text-align:left; vertical-align:top; }
    input,textarea { width:100%; border:1px solid #c8d2e2; border-radius:8px; padding:8px; margin:5px 0; font-size:13px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="side">
      <h3 id="adminTitle">后台管理</h3>
      <button data-tab="dashboard" data-i18n="dash">数据分析面板</button>
      <button data-tab="faq" data-i18n="faq">知识库/FAQ更新</button>
      <button data-tab="feedback" data-i18n="feedback">用户意见反馈管理</button>
      <button data-tab="users" data-i18n="users">用户管理</button>
      <button data-tab="settings" data-i18n="settings">系统基础设置</button>
    </aside>
    <main class="main">
      <div class="top">
        <h2 id="pageTitle">数据分析面板</h2>
        <button class="lang" id="langBtn">EN</button>
      </div>
      <section id="dashboard" class="panel active">
        <div class="cards">
          <div class="card"><div id="kpiVisitsLabel">访问量</div><h3 id="kpiVisits">0</h3></div>
          <div class="card"><div id="kpiQuestionsLabel">用户提问</div><h3 id="kpiQuestions">0</h3></div>
          <div class="card"><div id="kpiClicksLabel">按钮点击</div><h3 id="kpiClicks">0</h3></div>
          <div class="card"><div id="kpiFaqLabel">FAQ总数</div><h3 id="kpiFaq">0</h3></div>
        </div>
      </section>
      <section id="faq" class="panel">
        <div class="row">
          <input id="qZh" placeholder="问题（中文）" />
          <input id="qEn" placeholder="Question (EN)" />
        </div>
        <div class="row">
          <textarea id="aZh" rows="5" placeholder="回答（中文）"></textarea>
          <textarea id="aEn" rows="5" placeholder="Answer (EN)"></textarea>
        </div>
        <button class="lang" id="saveFaq">保存FAQ</button>
        <table id="faqTable"></table>
      </section>
      <section id="feedback" class="panel">
        <table id="feedbackTable"></table>
      </section>
      <section id="users" class="panel">
        <table id="usersTable"></table>
      </section>
      <section id="settings" class="panel">
        <pre id="settingsBox"></pre>
      </section>
    </main>
  </div>
  <script>
    const dict = {
      zh: { admin:"后台管理", dash:"数据分析面板", faq:"知识库/FAQ更新", feedback:"用户意见反馈管理", users:"用户管理", settings:"系统基础设置", visits:"访问量", questions:"用户提问", clicks:"按钮点击", faqCount:"FAQ总数" },
      en: { admin:"Admin Panel", dash:"Analytics Dashboard", faq:"Knowledge Base / FAQ", feedback:"Feedback Management", users:"User Management", settings:"System Settings", visits:"Visits", questions:"Questions", clicks:"Button Clicks", faqCount:"FAQ Count" }
    };
    let lang = "zh";
    let activeTab = "dashboard";
    function t(k){ return dict[lang][k] || k; }
    function setLang() {
      document.getElementById("adminTitle").textContent = t("admin");
      document.querySelectorAll("[data-i18n]").forEach(el => el.textContent = t(el.dataset.i18n));
      document.getElementById("kpiVisitsLabel").textContent = t("visits");
      document.getElementById("kpiQuestionsLabel").textContent = t("questions");
      document.getElementById("kpiClicksLabel").textContent = t("clicks");
      document.getElementById("kpiFaqLabel").textContent = t("faqCount");
      document.getElementById("pageTitle").textContent = t(document.querySelector(`[data-tab="${activeTab}"]`).dataset.i18n);
      document.getElementById("langBtn").textContent = lang === "zh" ? "EN" : "中文";
    }
    async function getJSON(url, options) {
      const res = await fetch(url, options);
      return res.json();
    }
    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      document.getElementById(tab).classList.add("active");
      setLang();
    }
 // 【全量真实统计】补全所有指标，无造假，纯真实操作数据
async function loadDashboard() {
  try {
    // 1. 读取真实埋点数据（你已正常运行的 /api/events 接口）
    const events = await getJSON("/api/events");
    // 2. 读取真实FAQ数据（你已有的 /api/faqs 接口，统计总数）
    const faqs = await getJSON("/api/faqs");

    // ========== 精准统计每个真实指标 ==========
    // 1. 访问量：统计所有「页面访问」埋点（已正常，保留）
    const visitCount = events.filter(item => item.type === "page_view").length;
    // 2. 用户提问：统计所有「用户发问题」埋点
    const questionCount = events.filter(item => item.type === "chat_send").length;
    // 3. 按钮点击：统计所有「点击类操作」埋点（切tab、切语言、点反馈）
    const clickCount = events.filter(item => 
      item.type === "tab_switch" || 
      item.type === "lang_switch" || 
      item.type === "feedback_click"
    ).length;
    // 4. FAQ总数：直接取FAQ数组的长度（真实条目数）
    const faqCount = faqs.length;

    // ========== 填充到面板 ==========
    document.getElementById("kpiVisits").textContent = visitCount;
    document.getElementById("kpiQuestions").textContent = questionCount;
    document.getElementById("kpiClicks").textContent = clickCount;
    document.getElementById("kpiFaq").textContent = faqCount;
  } catch (error) {
    console.error("统计数据加载失败:", error);
    // 兜底：避免面板空白，出错时显示0
    document.getElementById("kpiVisits").textContent = "0";
    document.getElementById("kpiQuestions").textContent = "0";
    document.getElementById("kpiClicks").textContent = "0";
    document.getElementById("kpiFaq").textContent = "0";
  }
}
    async function loadFaqs() {
      const faqs = await getJSON("/api/faqs");
      const table = document.getElementById("faqTable");
      table.innerHTML = "<tr><th>ID</th><th>ZH</th><th>EN</th><th>Action</th></tr>" + faqs.map(f =>
        `<tr><td>${f.id}</td><td>${f.question_zh}</td><td>${f.question_en}</td><td><button onclick="delFaq(${f.id})">Delete</button></td></tr>`
      ).join("");
    }
    async function delFaq(id) {
      await getJSON(`/api/faqs/${id}`, { method: "DELETE" });
      loadFaqs(); loadDashboard();
    }
    window.delFaq = delFaq;
    async function loadFeedback() {
      const rows = await getJSON("/api/feedback");
      document.getElementById("feedbackTable").innerHTML = "<tr><th>ID</th><th>Message</th><th>Email</th><th>Reply</th></tr>" + rows.map(r =>
        `<tr><td>${r.id}</td><td>${r.message}</td><td>${r.email || ""}</td><td>${r.reply || ""}</td></tr>`
      ).join("");
    }
    async function loadUsers() {
      const users = await getJSON("/api/users");
      document.getElementById("usersTable").innerHTML = "<tr><th>ID</th><th>User Agent</th><th>Time</th></tr>" + users.map(u =>
        `<tr><td>${u.id}</td><td>${u.ua}</td><td>${u.time}</td></tr>`
      ).join("");
    }
    async function loadSettings() {
      const s = await getJSON("/api/settings");
      document.getElementById("settingsBox").textContent = JSON.stringify(s, null, 2);
    }
    document.querySelectorAll("[data-tab]").forEach(btn => {
      btn.addEventListener("click", () => switchTab(btn.dataset.tab));
    });
    document.getElementById("langBtn").addEventListener("click", () => {
      lang = lang === "zh" ? "en" : "zh";
      setLang();
    });
    document.getElementById("saveFaq").addEventListener("click", async () => {
      const payload = {
        question_zh: document.getElementById("qZh").value.trim(),
        question_en: document.getElementById("qEn").value.trim(),
        answer_zh: document.getElementById("aZh").value.trim(),
        answer_en: document.getElementById("aEn").value.trim()
      };
      if (!payload.question_zh || !payload.question_en) return;
      await getJSON("/api/faqs", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      document.getElementById("qZh").value = ""; document.getElementById("qEn").value = "";
      document.getElementById("aZh").value = ""; document.getElementById("aEn").value = "";
      loadFaqs(); loadDashboard();
    });
    Promise.all([loadDashboard(), loadFaqs(), loadFeedback(), loadUsers(), loadSettings()]).then(setLang);
  </script>
</body>
</html>
