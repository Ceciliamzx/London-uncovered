<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>读懂伦敦 London Uncovered</title>
  <style>
    :root {
      --london-blue: #1a2b48;
      --off-white: #f8f5f0;
      --gold: #d4af37;
      --ink: #1d2430;
      --line: #d8dce3;
      --ai-bg: #eef2f7;
      --user-bg: #26426d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--off-white);
      color: var(--ink);
      overflow: hidden;
    }

    .layout {
      width: 100vw;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 260px;
      flex: 0 0 260px;
      background: var(--london-blue);
      color: #f6f8fc;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .brand {
      padding: 20px 18px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      flex: 0 0 auto;
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--london-blue);
    }

    .sidebar-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
      white-space: nowrap;
    }

    .brand p {
      margin: 6px 0 0;
      color: #c8d4e8;
      font-size: 12px;
      line-height: 1.4;
    }

    .section-title {
      font-size: 12px;
      letter-spacing: 0.6px;
      color: #a9bddb;
      text-transform: uppercase;
      margin: 14px 18px 8px;
    }

    .nav,
    .quick-list {
      padding: 0 12px;
      display: grid;
      gap: 8px;
    }

    .nav-btn,
    .quick-btn,
    .action {
      width: 100%;
      border: 1px solid #b8c2d0;
      background: var(--london-blue);
      color: #dbe7fb;
      border-radius: 10px;
      padding: 9px 10px;
      text-align: left;
      font-size: 13px;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .nav-btn:hover,
    .quick-btn:hover,
    .action:hover {
      background: #2a426a;
      color: #ffffff;
      border-color: #d1d7e2;
    }


    .project-note {
      margin-top: auto;
      padding: 14px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 12px;
      line-height: 1.55;
      color: #cfdbef;
    }

    .project-note b {
      color: var(--gold);
    }

    .chat-shell {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr auto;
      min-width: 0;
      background: linear-gradient(180deg, #f8f5f0 0%, #f2eee7 100%);
    }

    .chat-area {
      overflow-y: auto;
      padding: 22px 28px 100px;
      scroll-behavior: smooth;
    }

    .msg-row {
      display: flex;
      margin-bottom: 14px;
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(820px, 84%);
      border-radius: 14px;
      line-height: 1.72;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 12px 14px;
      border: 1px solid transparent;
      box-shadow: 0 6px 16px rgba(20, 33, 56, 0.08);
    }

    .msg-row.ai .bubble {
      background: var(--ai-bg);
      border-color: #d4dbe6;
      color: #1e2b3f;
      border-left: 4px solid var(--gold);
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      color: #f7fbff;
      border-color: #1f385c;
    }

    .sender {
      display: inline-block;
      font-size: 11px;
      margin-bottom: 6px;
      opacity: 0.85;
    }

    .composer {
      position: sticky;
      bottom: 0;
      padding: 12px 18px 16px;
      background: linear-gradient(180deg, rgba(248, 245, 240, 0.65) 0%, rgba(248, 245, 240, 1) 40%);
      backdrop-filter: blur(4px);
      border-top: 1px solid #dbdfE6;
    }

    .input-wrap {
      display: grid;
      grid-template-columns: 1fr 90px 90px;
      gap: 8px;
      max-width: 980px;
      margin: 0 auto;
    }

    .mode-wrap {
      max-width: 980px;
      margin: 0 auto 8px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    #input {
      width: 100%;
      border: 1px solid #c6cfdb;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }

    #input:focus {
      border-color: var(--london-blue);
      box-shadow: 0 0 0 3px rgba(26, 43, 72, 0.13);
    }

    .action {
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
    }

    .mode-btn {
      width: auto;
      min-width: 68px;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 999px;
    }

    .mode-btn.active {
      background: #2f4a76;
      color: #ffffff;
      border-color: #d8deea;
    }

    .typing {
      color: #5a687c;
      font-style: italic;
    }

    @media (max-width: 860px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex: 0 0 auto;
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.14);
        max-height: 45vh;
      }

      .chat-shell {
        min-height: 0;
      }

      .chat-area {
        padding: 14px 12px 96px;
      }

      .bubble {
        max-width: 94%;
      }

      .input-wrap {
        grid-template-columns: 1fr 76px 76px;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <aside class="sidebar">
      <section class="brand">
        <h1 id="brandTitle">读懂伦敦 London Uncovered</h1>
        <p id="brandDesc">留学生 / 游客 / 外来工作者的城市文化解释助手</p>
      </section>

      <div class="sidebar-scroll">
        <h2 class="section-title" id="navTitle">文化板块导航</h2>
        <section class="nav">
          <button class="nav-btn" data-push="饮食文化" data-push-en="Food Culture">饮食文化</button>

          <button class="quick-btn" data-q="为什么英国有下午茶文化？" data-q-en="Why does afternoon tea culture exist in the UK?" data-label-zh="下午茶文化的由来" data-label-en="Origin of Afternoon Tea">下午茶文化的由来</button>
          <button class="quick-btn" data-q="炸鱼薯条为何成为英国国菜？" data-q-en="Why is fish and chips a national dish in the UK?" data-label-zh="炸鱼薯条为什么火" data-label-en="Why Fish and Chips Matters">炸鱼薯条为什么火</button>
          <button class="quick-btn" data-q="伦敦多元饮食怎么形成？" data-q-en="How did London's diverse food culture form?" data-label-zh="伦敦多元饮食怎么来的" data-label-en="How Food Diversity Formed">伦敦多元饮食怎么来的</button>
          <button class="quick-btn" data-q="伦敦古着文化为何发达？" data-q-en="Why is vintage culture so developed in London?" data-label-zh="古着文化为什么发达" data-label-en="Why Vintage Culture Thrives">古着文化为什么发达</button>
          <button class="quick-btn" data-q="伦敦为何满是维多利亚排屋？" data-q-en="Why is London full of Victorian terraces?" data-label-zh="为什么到处是维多利亚排屋" data-label-en="Why So Many Victorian Terraces">为什么到处是维多利亚排屋</button>
          <button class="quick-btn" data-q="伦敦人为何依赖地铁？" data-q-en="Why do Londoners rely on the Tube?" data-label-zh="为什么依赖地铁" data-label-en="Why People Rely on the Tube">为什么依赖地铁</button>
          <button class="quick-btn" data-q="伦敦地铁Tube文化与通勤礼仪？" data-q-en="What are Tube culture and commuting etiquette in London?" data-label-zh="Tube通勤礼仪" data-label-en="Tube Commuting Etiquette">Tube通勤礼仪</button>
        </section>
      </div>

      <section class="project-note">
        <b id="projectNoteTitle">数字人文·文化解释AI</b><br />
        <span id="projectNoteDesc">前后端一体化：前台文化解释 + 后台管理与分析。</span>
      </section>
    </aside>

    <section class="chat-shell">
      <section id="chatArea" class="chat-area"></section>

      <footer class="composer">
        <div class="mode-wrap">
          <button id="briefMode" class="action mode-btn" type="button">简答</button>
          <button id="deepMode" class="action mode-btn active" type="button">详答</button>
          <button id="feedbackBtn" class="action mode-btn" type="button">反馈</button>
          <button id="langToggle" class="action mode-btn" type="button">EN</button>
        </div>
        <div class="input-wrap">
          <input id="input" type="text" placeholder="问我任何伦敦城市文化问题..." />
          <button id="send" class="action" type="button">发送</button>
          <button id="clear" class="action" type="button">清空</button>
        </div>
      </footer>
    </section>
  </main>

  <script>

    // 深度知识库：按题目 + 关键词模糊匹配
    const KB = [
      {
        q: "为什么英国有下午茶文化？",
        k: ["下午茶", "afternoon tea", "茶文化", "司康"],
        a: "【历史背景】\n下午茶最早是在19世纪上层家庭的作息里稳定下来的：午餐和晚餐间隔太久，人们先用茶和小点心补充体力，后来逐渐发展成有礼仪、有顺序的社交场景。\n\n【社会语境】\n它的意义从来不只是“喝茶”，而是通过一套温和、克制的流程维持关系、表达教养和确认身份边界，这很符合英国社会强调秩序感和分寸感的互动方式。\n\n【当代变化】\n现在下午茶已经从上层礼仪转成跨阶层文化消费：既有传统酒店的经典套餐，也有更年轻化、主题化、健康化的版本，功能也从日常礼仪扩展到旅游体验与社交表达。\n\n【具体案例】\n在伦敦你会看到两种典型路径：一类坚持银壶、三层架和司康流程；另一类在口味上加入多文化元素。第一次体验可按“咸点→司康→甜点”的顺序，更容易进入语境。"
      },
      {
        q: "炸鱼薯条为何成为英国国菜？",
        k: ["炸鱼薯条", "fish and chips", "国菜", "英国菜"],
        a: "【历史背景】\n炸鱼和薯条在工业化时期完成组合，关键原因是成本低、热量高、出餐快，正好适应快速城市化中工人群体的饮食需求，随后在全国连锁化传播。\n\n【社会语境】\n它之所以成为“国民食物”，是因为不同阶层都能接触、都能接受，在战争和经济波动时期也具备稳定情绪与日常节奏的作用，形成了跨代共享的饮食记忆。\n\n【当代变化】\n当代版本更强调食材选择和烹饪方式，很多店在传统口味基础上加入更清爽的搭配，消费者也更关注来源透明、营养平衡与可持续消费。\n\n【具体案例】\n伦敦老店仍保留朴素传统做法，新派餐厅则会搭配精酿和升级配菜。实操上，选择客流稳定、换油频率高、鱼肉现炸的店，口感通常更好。"
      },
      {
        q: "伦敦多元饮食怎么形成？",
        k: ["多元饮食", "咖喱街", "唐人街", "加勒比", "移民饮食"],
        a: "【历史背景】\n伦敦饮食多元是长期人口流动的结果：贸易网络、移民迁徙、教育与就业机会共同作用，让不同地区的食材、做法和餐饮经营方式持续进入城市。\n\n【社会语境】\n餐馆在这里不只是商业空间，也是社群建立归属、维系代际记忆、与城市主流互动的接口，所以“吃什么”常常也在回答“我是谁、我来自哪里”。\n\n【当代变化】\n现在的趋势从“并列共存”走向“融合共创”：菜系边界更柔和，街头小店和新餐饮品牌都在做跨文化混搭，城市饮食不断产生新组合。\n\n【具体案例】\n你可以在同一晚跨街区体验南亚、东亚和加勒比风味。对新来者最有效的方式是按街区探索，而不是只按菜名搜店，这样更能看见文化层次。"
      },
      {
        q: "伦敦Pub文化与社交规则是什么？",
        k: ["pub", "酒吧文化", "请酒", "轮流买单"],
        a: "【历史背景】\nPub由早期酒馆传统演化而来，工业化后成为街区社交的核心节点，长期承担“让陌生人有机会低门槛互动”的功能。\n\n【社会语境】\n常见的 rounds（轮流请一轮）体现的是关系互惠而非即时结算，重点不是算得最精，而是维持社交节奏与彼此体面。\n\n【当代变化】\n当代 pub 已经是餐饮、观赛、家庭聚会、社区活动并存的复合空间，但其底层逻辑没变：以轻规则支持高频社交。\n\n【具体案例】\n第一次去本地 pub，先在吧台点单、拿到饮品再找位最稳妥；不插队、不过度喧闹、轮到自己时快速点单，基本就不会尴尬。"
      },
      {
        q: "伦敦人穿衣“随意又精致”的文化原因？",
        k: ["穿衣", "随意又精致", "通勤穿搭", "dress code"],
        a: "【历史背景】\n伦敦长期并行两条风格路径：一条是讲究剪裁与工艺的传统正装线，一条是不断更新的街头文化线，两者长期共存，塑造了城市独特审美。\n\n【社会语境】\n“随意又精致”本质是场景管理：通勤要耐候和实用，社交要表达个性，再叠加多变天气，最终形成分层穿搭与克制配色的日常策略。\n\n【当代变化】\n现在更多人采用“基础款+个性单品”的组合，二手、独立设计和高街品牌混搭成为主流，消费逻辑也从一次性流行转向复穿率和功能性。\n\n【具体案例】\n你在工作区常见中性色防水外套，在创意街区会看到复古拼搭。入门可先做“通勤胶囊衣橱”，再用鞋、包、外套做风格加法。"
      },
      {
        q: "伦敦古着文化为何发达？",
        k: ["古着", "二手", "vintage", "charity shop", "depop"],
        a: "【历史背景】\n伦敦古着文化建立在慈善商店体系、跳蚤市场传统和青年文化长期互动之上，二手循环在本地并不是新概念，而是持续很多年的生活方式。\n\n【社会语境】\n古着消费同时满足三件事：预算控制、个性表达和价值立场。它让人们在“买得起”和“穿得出区别”之间找到平衡。\n\n【当代变化】\n线上平台推动古着从小圈层走向大众化，流通效率更高，价格也更透明，年轻群体把二手视为常规选项而非妥协。\n\n【具体案例】\n线下可逛东伦敦和西伦敦的古着密集街区，线上可追本地卖家。新手建议优先买外套、针织和皮鞋，耐用度高、试错成本低。"
      },
      {
        q: "英国排队、消费、小费礼仪是什么？",
        k: ["排队", "小费", "礼仪", "消费习惯"],
        a: "【历史背景】\n英国城市日常秩序长期依赖可预期规则，排队文化正是在高密度公共生活中逐步固化下来的，成为最直观的社会协作机制。\n\n【社会语境】\n排队、小费、退换流程看似琐碎，实则是在降低陌生人社会的摩擦成本：每个人按同一套规则行动，冲突自然减少。\n\n【当代变化】\n无接触支付和标准化账单让消费流程更透明；餐厅服务费常常直接写入明细，顾客更重视“先看账单再决定是否加给”。\n\n【具体案例】\n实操最稳是三步：先排队、看明细、留小票。餐厅若已含服务费通常不必重复加给，咖啡和外卖场景一般更灵活。"
      },
      {
        q: "伦敦为何满是维多利亚排屋？",
        k: ["维多利亚排屋", "1875", "公共卫生法", "terrace", "联排"],
        a: "【历史背景】\n维多利亚时期人口快速增长，城市需要可复制、可控成本的住宅模型，排屋因此成为主流方案；卫生法规完善后，通风、采光、排水标准也推动了街区建造的统一化。\n\n【社会语境】\n排屋的价值不只在单栋房子，而在整条街的秩序：连续立面、步行友好、近距离生活设施，体现的是工业城市如何组织中等密度生活。\n\n【当代变化】\n今天常见“外观保留、内部更新”模式：历史风貌被延续，室内则适配现代保温、合租和家庭结构变化，保护与增密长期并行。\n\n【具体案例】\nIslington、Notting Hill 等地是典型观察点。看这类房子时，除了外观审美，更该关注能效、维护成本和交通可达性。"
      },
      {

      await wait(260);
      content.classList.remove("typing");
      content.textContent = "";

      for (const char of text) {
        content.textContent += char;
        let speed = 14 + Math.random() * 20;
        if ("，、".includes(char)) speed += 45;
        if ("。！？；：".includes(char)) speed += 95;
        if (char === "\n") speed += 70;
        await wait(speed);
        chatArea.scrollTop = chatArea.scrollHeight;
      }
    }

    function toBriefAnswer(text) {
      const sections = currentLang === "zh"
        ? ["【历史背景】", "【社会语境】", "【当代变化】", "【具体案例】"]
        : ["[Historical Background]", "[Social Context]", "[Contemporary Change]", "[Concrete Example]"];
      return sections
        .map((title) => {
          const start = text.indexOf(title);
          if (start === -1) return "";
          const nextPositions = sections
            .map((s) => text.indexOf(s, start + title.length))
            .filter((p) => p > start);
          const end = nextPositions.length ? Math.min(...nextPositions) : text.length;
          const body = text.slice(start + title.length, end).trim();
          const sentenceSep = currentLang === "zh" ? "。" : ".";
          const firstSentence = body.split(sentenceSep)[0].trim();
          const brief = firstSentence ? `${firstSentence}${sentenceSep}` : body.slice(0, 80);
          return `${title}\n${brief}`;
        })
        .filter(Boolean)
        .join("\n\n");
    }

    function getDeepSupplement(context) {
      const c = normalize(context);
      const hit = DEEP_SUPPLEMENTS.find((item) =>
        item.keys.some((k) => c.includes(normalize(k)))
      );
      if (hit) return hit.extra;
      return {
        history: "很多伦敦日常现象都不是孤立出现，而是在长期历史路径中逐步定型。",
        social: "真正影响体验的往往是隐性规则，而不是表面形式。",
        current: "当下变化通常表现为传统框架仍在，但使用方式更灵活。",
        case: "如果你愿意，我可以继续按你的具体生活场景做一版更定制化的解释。"
      };
    }

    function mergeDeepIntoSections(text, extra) {
      const map = [
        { title: "【历史背景】", key: "history" },
        { title: "【社会语境】", key: "social" },
        { title: "【当代变化】", key: "current" },
        { title: "【具体案例】", key: "case" }
      ];

      let result = text;
      for (let i = 0; i < map.length; i += 1) {
        const current = map[i];
        const next = map[i + 1];
        const start = result.indexOf(current.title);
        if (start === -1) continue;
        const bodyStart = start + current.title.length;
        const end = next ? result.indexOf(next.title, bodyStart) : result.length;
        if (end === -1) continue;
        const body = result.slice(bodyStart, end).trim();
        const extraLine = extra[current.key] ? ` ${extra[current.key]}` : "";
        const mergedBody = `${body}${extraLine}`.trim();
        result = `${result.slice(0, bodyStart)}\n${mergedBody}\n\n${result.slice(end)}`;
      }
      return result.replace(/\n{3,}/g, "\n\n").trim();
    }

    function applyMode(text, context = "") {
      if (answerMode === "brief") return toBriefAnswer(text);
      if (currentLang === "en") return text;
      const extra = getDeepSupplement(context || text);
      return mergeDeepIntoSections(text, extra);
    }

    function setMode(mode) {
      answerMode = mode;
      briefMode.classList.toggle("active", mode === "brief");
      deepMode.classList.toggle("active", mode === "deep");
    }

    function bestMatch(question) {
      const q = normalize(question);
      if (!q) return currentLang === "en" ? englishAnswerForQuestion("general london culture") : "【历史背景】\n伦敦文化问题通常都和历史演变有关，单看表面现象容易误判。\n\n【社会语境】\n留学生、游客和新工作者最常遇到的困惑，往往来自“规则默会”而不是语言本身。\n\n【当代变化】\n今天很多传统都在数字化和全球化环境下被重新解释。\n\n【具体案例】\n你可以直接问：下午茶、古着、维多利亚排屋、Tube 礼仪、租房避坑，我会按同一结构帮你拆开讲。";

      const exact = KB.find((item) => normalize(item.q) === q);
      if (exact) return localizedAnswer(exact);

      let best = null;
      let scoreMax = 0;
      for (const item of KB) {
        let score = 0;
        for (const kw of item.k) {
          if (q.includes(normalize(kw))) score += 1;
        }
        if (score > scoreMax) {
          scoreMax = score;
          best = item;
        }
      }

      if (best) return localizedAnswer(best);
      return currentLang === "en" ? englishAnswerForQuestion("fallback") : "【历史背景】\n这个问题很值得讲，但我需要更明确的关键词，才能对准对应的历史线索。\n\n【社会语境】\n伦敦很多文化现象是连在一起的，问题越具体，回答就越贴近日常生活。\n\n【当代变化】\n同一件事在今天往往会出现多种版本，我会优先解释最常见、最实用的现实情境。\n\n【具体案例】\n你可以换个问法，比如：下午茶、古着、维多利亚排屋、Tube 礼仪、租房避坑。";
    }

    function postEvent(type, extra = {}) {
      fetch("/api/events", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type, ...extra })
      }).catch(() => {});
    }

    function setLanguage(lang) {
      currentLang = lang;
      document.getElementById("brandDesc").textContent = UI_TEXT[lang].brandDesc;
      document.getElementById("navTitle").textContent = UI_TEXT[lang].navTitle;
      document.getElementById("quickTitle").textContent = UI_TEXT[lang].quickTitle;
      document.getElementById("projectNoteTitle").textContent = UI_TEXT[lang].projectTitle;
      document.getElementById("projectNoteDesc").textContent = UI_TEXT[lang].projectDesc;
      briefMode.textContent = UI_TEXT[lang].brief;
      deepMode.textContent = UI_TEXT[lang].deep;
      feedbackBtn.textContent = UI_TEXT[lang].feedback;
      send.textContent = UI_TEXT[lang].send;
      clear.textContent = UI_TEXT[lang].clear;
      input.placeholder = UI_TEXT[lang].placeholder;
      langToggle.textContent = lang === "zh" ? "EN" : "中文";
      document.querySelectorAll(".quick-btn").forEach((btn) => {
        btn.textContent = lang === "zh" ? btn.getAttribute("data-label-zh") : btn.getAttribute("data-label-en");
      });
      document.querySelectorAll(".nav-btn").forEach((btn) => {
        btn.textContent = lang === "zh" ? btn.getAttribute("data-push") : btn.getAttribute("data-push-en");
      });
    }

    let busy = false;
    async function ask(text) {
      const q = (text || "").trim();
      if (!q || busy) return;
      busy = true;
      pushUser(q);
      postEvent("question");
      const ans = applyMode(bestMatch(q), q);
      await typeAI(ans);
      input.value = "";
      busy = false;
      input.focus();
    }

    send.addEventListener("click", () => ask(input.value));
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        ask(input.value);
      }
    });

    clear.addEventListener("click", async () => {
      if (busy) return;
      chatArea.innerHTML = "";
      await typeAI(UI_TEXT[currentLang].cleared);
    });

    document.querySelectorAll(".quick-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        postEvent("button_click");
        ask(currentLang === "zh" ? (btn.getAttribute("data-q") || "") : (btn.getAttribute("data-q-en") || ""));
      });
    });

    document.querySelectorAll(".nav-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const section = currentLang === "zh" ? btn.getAttribute("data-push") : btn.getAttribute("data-push-en");
        if (!section || busy) return;
        busy = true;
        postEvent("button_click");
        pushUser(currentLang === "zh" ? sectionPrompts[section] : sectionPromptsEn[section]);
        await typeAI(applyMode(currentLang === "zh" ? sectionAnswers[section] : sectionAnswersEn[section], section));
        busy = false;
      });
    });

    briefMode.addEventListener("click", () => setMode("brief"));
    deepMode.addEventListener("click", () => setMode("deep"));
    feedbackBtn.addEventListener("click", async () => {
      const message = prompt(
        currentLang === "zh"
          ? "请输入你的反馈意见："
          : "Please enter your feedback:"
      );
      if (!message || !message.trim()) return;
      const email = prompt(
        currentLang === "zh"
          ? "可选：留下邮箱便于回复（可留空）"
          : "Optional: leave your email for follow-up (can be empty)"
      ) || "";

      try {
        await fetch("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: message.trim(), email: email.trim() })
        });
        await typeAI(
          currentLang === "zh"
            ? "【历史背景】\n伦敦公共服务文化一直重视反馈循环。\n\n【社会语境】\n你的使用意见会帮助系统更贴近真实场景。\n\n【当代变化】\n现在反馈已提交到后台管理系统，可用于后续优化。\n\n【具体案例】\n你刚刚提交的内容，管理员已可在反馈管理页面查看。"
            : "[Historical Background]\nPublic-service culture values feedback loops.\n\n[Social Context]\nYour input helps improve real-world usability.\n\n[Contemporary Change]\nYour feedback has been submitted to the admin system.\n\n[Concrete Example]\nAn administrator can now review it in the feedback management panel."
        );
      } catch (e) {
        await typeAI(
          currentLang === "zh"
            ? "【历史背景】\n反馈机制依赖后端接口保持在线可用。\n\n【社会语境】\n当前前端页面仍可正常使用，但反馈通道暂时不可达。\n\n【当代变化】\n请稍后重试，或联系管理员检查服务状态。\n\n【具体案例】\n后台恢复后，你的反馈可在管理端“用户意见反馈管理”页面查看。"
            : "[Historical Background]\nFeedback submission depends on backend API availability.\n\n[Social Context]\nThe front-end remains usable, but the feedback channel is temporarily unreachable.\n\n[Contemporary Change]\nPlease retry shortly or ask the admin to check service health.\n\n[Concrete Example]\nOnce restored, your message will appear in the feedback management panel."
        );
      }
    });
    langToggle.addEventListener("click", () => setLanguage(currentLang === "zh" ? "en" : "zh"));

    setLanguage("zh");
    postEvent("visit");
    postEvent("user_visit", { ua: navigator.userAgent });
    typeAI(UI_TEXT[currentLang].welcome);
    // 强制发送页面访问埋点（让数据分析面板显示数据）
window.addEventListener('load', function() {
  postEvent('page_view', { page: '/' });
});

  </script>
 <script>
  // 全自动真实埋点，不碰任何原有代码
  window.onload = function(){
    postEvent("page_view",{}); // 访问量
  }
  // 发送消息 = 提问数
  document.addEventListener("click",function(e){
    if(e.target.type=="submit" || e.target.classList.contains("send")){
      postEvent("chat_send",{});
    }
  });
  // 切换Tab/语言 = 点击数
  document.addEventListener("click",function(e){
    if(e.target.classList.contains("tab") || e.target.classList.contains("lang")){
      postEvent("tab_switch",{});
    }
  });
  </script>
