<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>读懂伦敦 London Uncovered</title>
  <style>
    :root {
      --london-blue: #1a2b48;
      --off-white: #f8f5f0;
      --gold: #d4af37;
      --ink: #1d2430;
      --line: #d8dce3;
      --ai-bg: #eef2f7;
      --user-bg: #26426d;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--off-white);
      color: var(--ink);
      overflow: hidden;
    }

    .layout {
      width: 100vw;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 260px;
      flex: 0 0 260px;
      background: var(--london-blue);
      color: #f6f8fc;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .brand {
      padding: 20px 18px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
      background: var(--london-blue);
    }

    .sidebar-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
      white-space: nowrap;
    }

    .brand p {
      margin: 6px 0 0;
      color: #c8d4e8;
      font-size: 12px;
      line-height: 1.4;
    }

    .section-title {
      font-size: 12px;
      letter-spacing: 0.6px;
      color: #a9bddb;
      text-transform: uppercase;
      margin: 14px 18px 8px;
    }

    .nav,
    .quick-list {
      padding: 0 12px;
      display: grid;
      gap: 8px;
    }

    .nav-btn,
    .quick-btn,
    .action {
      width: 100%;
      border: 1px solid #b8c2d0;
      background: var(--london-blue);
      color: #dbe7fb;
      border-radius: 10px;
      padding: 9px 10px;
      text-align: left;
      font-size: 13px;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .nav-btn:hover,
    .quick-btn:hover,
    .action:hover {
      background: #2a426a;
      color: #ffffff;
      border-color: #d1d7e2;
    }

    .project-note {
      margin-top: auto;
      padding: 14px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 12px;
      line-height: 1.55;
      color: #cfdbef;
    }

    .project-note b {
      color: var(--gold);
    }

    .chat-shell {
      flex: 1;
      display: grid;
      grid-template-rows: 1fr auto;
      min-width: 0;
      background: linear-gradient(180deg, #f8f5f0 0%, #f2eee7 100%);
    }

    .chat-area {
      overflow-y: auto;
      padding: 22px 28px 100px;
      scroll-behavior: smooth;
    }

    .msg-row {
      display: flex;
      margin-bottom: 14px;
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(820px, 84%);
      border-radius: 14px;
      line-height: 1.72;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 12px 14px;
      border: 1px solid transparent;
      box-shadow: 0 6px 16px rgba(20, 33, 56, 0.08);
    }

    .msg-row.ai .bubble {
      background: var(--ai-bg);
      border-color: #d4dbe6;
      color: #1e2b3f;
      border-left: 4px solid var(--gold);
    }

    .msg-row.user .bubble {
      background: var(--user-bg);
      color: #f7fbff;
      border-color: #1f385c;
    }

    .sender {
      display: inline-block;
      font-size: 11px;
      margin-bottom: 6px;
      opacity: 0.85;
    }

    .composer {
      position: sticky;
      bottom: 0;
      padding: 12px 18px 16px;
      background: linear-gradient(180deg, rgba(248, 245, 240, 0.65) 0%, rgba(248, 245, 240, 1) 40%);
      backdrop-filter: blur(4px);
      border-top: 1px solid #dbdfe6;
    }

    .input-wrap {
      display: grid;
      grid-template-columns: 1fr 90px 90px;
      gap: 8px;
      max-width: 980px;
      margin: 0 auto;
    }

    .mode-wrap {
      max-width: 980px;
      margin: 0 auto 8px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    #input {
      width: 100%;
      border: 1px solid #c6cfdb;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      background: #fff;
      outline: none;
    }

    #input:focus {
      border-color: var(--london-blue);
      box-shadow: 0 0 0 3px rgba(26, 43, 72, 0.13);
    }

    .action {
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
    }

    .mode-btn {
      width: auto;
      min-width: 68px;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 999px;
    }

    .mode-btn.active {
      background: #2f4a76;
      color: #ffffff;
      border-color: #d8deea;
    }

    .typing {
      color: #5a687c;
      font-style: italic;
    }

    @media (max-width: 860px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex: 0 0 auto;
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.14);
        max-height: 45vh;
      }

      .chat-shell {
        min-height: 0;
      }

      .chat-area {
        padding: 14px 12px 96px;
      }

      .bubble {
        max-width: 94%;
      }

      .input-wrap {
        grid-template-columns: 1fr 76px 76px;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <aside class="sidebar">
      <section class="brand">

          <button class="quick-btn" data-q="伦敦古着文化为何发达？" data-q-en="Why is vintage culture so developed in London?" data-label-zh="古着文化为什么发达" data-label-en="Why Vintage Culture Thrives">古着文化为什么发达</button>
          <button class="quick-btn" data-q="伦敦为何满是维多利亚排屋？" data-q-en="Why is London full of Victorian terraces?" data-label-zh="为什么到处是维多利亚排屋" data-label-en="Why So Many Victorian Terraces">为什么到处是维多利亚排屋</button>
          <button class="quick-btn" data-q="伦敦人为何依赖地铁？" data-q-en="Why do Londoners rely on the Tube?" data-label-zh="为什么依赖地铁" data-label-en="Why People Rely on the Tube">为什么依赖地铁</button>

        </section>
      </div>

      <section class="project-note">

    </aside>

    <section class="chat-shell">

      <footer class="composer">

          <button id="send" class="action" type="button">发送</button>
          <button id="clear" class="action" type="button">清空</button>
        </div>
      </footer>
    </section>
  </main>

  <script>
    function postEvent(type, extra = {}) {
      fetch("/api/events", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          type,
          ...extra
        })
      }).catch(() => {});

    const KB = [
      {
        q: "为什么英国有下午茶文化？",
        k: ["下午茶", "afternoon tea", "茶文化", "司康"],
        a: "【历史背景】\n下午茶最早是在19世纪上层家庭的作息里稳定下来的：午餐和晚餐间隔太久，人们先用茶和小点心补充体力，后来逐渐发展成有礼仪、有顺序的社交场景。\n\n【社会语境】\n它的意义从来不只是“喝茶”，而是通过一套温和、克制的流程维持关系、表达教养和确认身份边界，这很符合英国社会强调秩序感和分寸感的互动方式。\n\n【当代变化】\n现在下午茶已经从上层礼仪转成跨阶层文化消费：既有传统酒店的经典套餐，也有更年轻化、主题化、健康化的版本。\n\n【具体案例】\n第一次体验可按“咸点→司康→甜点”的顺序，更容易进入语境。"
      },
      {
        q: "炸鱼薯条为何成为英国国菜？",

        a: "【历史背景】\n炸鱼和薯条在工业化时期完成组合，关键原因是成本低、热量高、出餐快，适应了城市工人群体的饮食需求。\n\n【社会语境】\n它之所以成为“国民食物”，是因为不同阶层都能接触、都能接受，形成了跨代共享的饮食记忆。\n\n【当代变化】\n当代版本更强调食材选择和烹饪方式，很多店在传统口味基础上加入更清爽的搭配。\n\n【具体案例】\n选择客流稳定、现炸出品的店，整体体验通常更好。"
      },
      {
        q: "伦敦多元饮食怎么形成？",
        k: ["多元饮食", "咖喱街", "唐人街", "加勒比", "移民饮食"],
        a: "【历史背景】\n伦敦饮食多元是长期人口流动、贸易网络和移民迁徙共同作用的结果。\n\n【社会语境】\n餐馆在这里不只是商业空间，也是社群建立归属、维系代际记忆的重要载体。\n\n【当代变化】\n现在的趋势从“并列共存”走向“融合共创”，菜系边界越来越柔和。\n\n【具体案例】\n对新来者最有效的方式是按街区探索，而不是只按菜名搜店。"
      },
      {
        q: "伦敦古着文化为何发达？",
        k: ["古着", "二手", "vintage", "charity shop", "depop"],
        a: "【历史背景】\n伦敦古着文化建立在慈善商店体系、跳蚤市场传统和青年文化长期互动之上。\n\n【社会语境】\n古着消费同时满足预算控制、个性表达和价值立场三种需求。\n\n【当代变化】\n线上平台推动古着从小圈层走向大众化，流通效率更高，价格也更透明。\n\n【具体案例】\n新手建议优先买外套、针织和皮鞋，耐用度高、试错成本低。"
      },
      {
        q: "伦敦为何满是维多利亚排屋？",
        k: ["维多利亚排屋", "terrace", "联排", "排屋"],
        a: "【历史背景】\n维多利亚时期人口快速增长，城市需要可复制、可控成本的住宅模型，排屋因此成为主流方案。\n\n【社会语境】\n排屋的价值不只在单栋房子，而在整条街的连续秩序和步行尺度。\n\n【当代变化】\n今天常见“外观保留、内部更新”模式：历史风貌被延续，室内则适配现代生活。\n\n【具体案例】\n看这类房子时，除了外观审美，更该关注能效、维护成本和交通可达性。"
      },
      {
        q: "伦敦人为何依赖地铁？",
        k: ["依赖地铁", "tube", "通勤", "地铁"],
        a: "【历史背景】\n地铁早期建设与城市扩张长期绑定，形成了“轨道先行、居住外扩、中心就业”的格局。\n\n【社会语境】\n人们依赖地铁的核心并不只是速度，而是时间可预期。\n\n【当代变化】\n支付方式和换乘系统持续优化，地铁与其他出行方式联动更紧密。\n\n【具体案例】\n很多人找房时优先看换乘次数和拥堵节点，而不是直线距离。"

        aiName: "读懂伦敦 AI",
        typing: "正在输入...",
        welcome: "欢迎来到「读懂伦敦 London Uncovered」！你可以直接提问，也可以点左侧板块，我会用本地人的视角，把伦敦的文化逻辑讲得明明白白。",
        cleared: "我们重新开始吧。你可以从左侧板块点一个方向，或者直接问我你最困惑的伦敦生活问题。"
      },
      en: {
        brandDesc: "A cultural interpretation assistant for students, visitors, and global workers in London",
        navTitle: "Culture Navigation",
        quickTitle: "Quick Questions (7)",
        projectTitle: "Digital Humanities · Cultural Interpretation AI",
        projectDesc: "Integrated stack: front-end cultural assistant + back-end management analytics.",
        brief: "Brief",
        deep: "Detailed",
        feedback: "Feedback",
        send: "Send",
        clear: "Clear",
        placeholder: "Ask me anything about London's urban culture...",
        aiName: "London Uncovered AI",
        typing: "Typing...",
        welcome: "Welcome to London Uncovered! Ask directly or click a section on the left.",
        cleared: "Fresh start. Choose a section on the left, or ask your question directly."
      }
    };

    function normalize(text) {
      return (text || "").trim().toLowerCase();
    }

    function englishAnswerForQuestion(q) {
      const key = normalize(q);
      if (key.includes("afternoon tea")) return "[Historical Background]\nAfternoon tea emerged in 19th-century elite schedules.\n\n[Social Context]\nIt became a ritualized social format.\n\n[Contemporary Change]\nToday it spans luxury hotels and casual cafés.\n\n[Concrete Example]\nA practical order is savory items, scones, then sweets.";
      if (key.includes("fish and chips")) return "[Historical Background]\nFish and chips scaled during industrial urbanization.\n\n[Social Context]\nIt became a cross-class shared meal.\n\n[Contemporary Change]\nPeople now care more about sourcing and cooking quality.\n\n[Concrete Example]\nClassic shops and modern reinterpretations coexist.";
      if (key.includes("tube") || key.includes("commut")) return "[Historical Background]\nLondon's transport structure was built around rail expansion.\n\n[Social Context]\nCommuting relies on predictability and etiquette.\n\n[Contemporary Change]\nHybrid work changed timing patterns, not the role of rail.\n\n[Concrete Example]\nReducing unstable transfers often improves commute quality.";
      if (key.includes("terrace") || key.includes("housing")) return "[Historical Background]\nTerraced housing expanded with industrial growth.\n\n[Social Context]\nHousing reflects opportunity distribution.\n\n[Contemporary Change]\nLondon preserves streetscapes while modernizing interiors.\n\n[Concrete Example]\nCompare homes by rent, commute time, and maintenance burden.";
      return "[Historical Background]\nThis topic has a long historical buildup.\n\n[Social Context]\nMost London cultural practices are rule-based coordination.\n\n[Contemporary Change]\nTraditional frameworks continue in more flexible ways.\n\n[Concrete Example]\nRefine your question with a concrete keyword for a deeper answer.";
    }

    function localizedAnswer(item) {
      return currentLang === "en" ? englishAnswerForQuestion(item.q) : item.a;
    }

    function bestMatch(question) {
      const q = normalize(question);
      if (!q) {
        return currentLang === "en"
          ? englishAnswerForQuestion("general london culture")
          : "【历史背景】\n伦敦文化问题通常都和历史演变有关。\n\n【社会语境】\n新来者最常遇到的困惑，往往来自规则默会。\n\n【当代变化】\n今天很多传统都在数字化和全球化环境下被重新解释。\n\n【具体案例】\n你可以直接问：下午茶、古着、排屋、Tube 礼仪。";
      }

      const exact = KB.find(item => normalize(item.q) === q);
      if (exact) return localizedAnswer(exact);

      let best = null;
      let scoreMax = 0;

      for (const item of KB) {
        let score = 0;
        for (const kw of item.k) {
          if (q.includes(normalize(kw))) score += 1;
        }
        if (score > scoreMax) {
          scoreMax = score;
          best = item;
        }
      }

      if (best) return localizedAnswer(best);

      return currentLang === "en"
        ? englishAnswerForQuestion("fallback")
        : "【历史背景】\n这个问题很值得讲，但我需要更明确的关键词。\n\n【社会语境】\n伦敦很多文化现象是连在一起的，问题越具体，回答越贴近日常生活。\n\n【当代变化】\n同一件事在今天往往会出现多种版本。\n\n【具体案例】\n你可以换个问法，比如：下午茶、古着、维多利亚排屋、Tube 礼仪。";
    }

    function createBubble(role) {
      const row = document.createElement("div");
      row.className = `msg-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const content = document.createElement("div");

      if (role === "ai") {
        const sender = document.createElement("span");
        sender.className = "sender";
        sender.textContent = UI_TEXT[currentLang].aiName;
        bubble.appendChild(sender);
      }

      bubble.appendChild(content);
      row.appendChild(bubble);
      chatArea.appendChild(row);
      chatArea.scrollTop = chatArea.scrollHeight;

      return content;
    }

    function pushUser(text) {
      const content = createBubble("user");
      content.textContent = text;
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function typeAI(text) {
      const content = createBubble("ai");
      content.classList.add("typing");
      content.textContent = UI_TEXT[currentLang].typing;
      await wait(180);
      content.classList.remove("typing");
      content.textContent = "";

      for (const char of text) {
        content.textContent += char;
        await wait(char === "\n" ? 18 : 10);
        chatArea.scrollTop = chatArea.scrollHeight;
      }
    }

    function toBriefAnswer(text) {
      const sections = currentLang === "zh"
        ? ["【历史背景】", "【社会语境】", "【当代变化】", "【具体案例】"]
        : ["[Historical Background]", "[Social Context]", "[Contemporary Change]", "[Concrete Example]"];

      return sections.map(title => {
        const start = text.indexOf(title);
        if (start === -1) return "";

        const nextPositions = sections
          .map(s => text.indexOf(s, start + title.length))
          .filter(p => p > start);

        const end = nextPositions.length ? Math.min(...nextPositions) : text.length;
        const body = text.slice(start + title.length, end).trim();
        const sentenceSep = currentLang === "zh" ? "。" : ".";
        const firstSentence = body.split(sentenceSep)[0].trim();
        const brief = firstSentence ? `${firstSentence}${sentenceSep}` : body.slice(0, 80);

        return `${title}\n${brief}`;
      }).filter(Boolean).join("\n\n");
    }

    function applyMode(text) {
      return answerMode === "brief" ? toBriefAnswer(text) : text;
    }

    function setMode(mode) {
      answerMode = mode;
      briefMode.classList.toggle("active", mode === "brief");
      deepMode.classList.toggle("active", mode === "deep");
    }

    function setLanguage(lang) {
      currentLang = lang;
      document.getElementById("brandDesc").textContent = UI_TEXT[lang].brandDesc;
      document.getElementById("navTitle").textContent = UI_TEXT[lang].navTitle;
      document.getElementById("quickTitle").textContent = UI_TEXT[lang].quickTitle;
      document.getElementById("projectNoteTitle").textContent = UI_TEXT[lang].projectTitle;
      document.getElementById("projectNoteDesc").textContent = UI_TEXT[lang].projectDesc;
      briefMode.textContent = UI_TEXT[lang].brief;
      deepMode.textContent = UI_TEXT[lang].deep;
      feedbackBtn.textContent = UI_TEXT[lang].feedback;
      send.textContent = UI_TEXT[lang].send;
      clear.textContent = UI_TEXT[lang].clear;
      input.placeholder = UI_TEXT[lang].placeholder;
      langToggle.textContent = lang === "zh" ? "EN" : "中文";

      document.querySelectorAll(".quick-btn").forEach(btn => {
        btn.textContent = lang === "zh"
          ? btn.getAttribute("data-label-zh")
          : btn.getAttribute("data-label-en");
      });

      document.querySelectorAll(".nav-btn").forEach(btn => {
        btn.textContent = lang === "zh"
          ? btn.getAttribute("data-push")
          : btn.getAttribute("data-push-en");
      });
    }

    async function ask(text) {
      const q = (text || "").trim();
      if (!q || busy) return;

      busy = true;
      pushUser(q);
      postEvent("chat_send", { question: q });

      const ans = applyMode(bestMatch(q));
      await typeAI(ans);

      input.value = "";
      busy = false;
      input.focus();
    }

    send.addEventListener("click", () => ask(input.value));

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        ask(input.value);
      }
    });

    clear.addEventListener("click", async () => {
      if (busy) return;
      chatArea.innerHTML = "";
      await typeAI(UI_TEXT[currentLang].cleared);
    });

    document.querySelectorAll(".quick-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        postEvent("button_click", { source: "quick-btn" });
        ask(currentLang === "zh"
          ? (btn.getAttribute("data-q") || "")
          : (btn.getAttribute("data-q-en") || ""));
      });
    });

    document.querySelectorAll(".nav-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const section = currentLang === "zh"
          ? btn.getAttribute("data-push")
          : btn.getAttribute("data-push-en");

        if (!section || busy) return;

        busy = true;
        postEvent("button_click", { source: "nav-btn", section });

        pushUser(currentLang === "zh" ? sectionPrompts[section] : sectionPromptsEn[section]);
        await typeAI(applyMode(currentLang === "zh" ? sectionAnswers[section] : sectionAnswersEn[section]));

        busy = false;
      });
    });

    briefMode.addEventListener("click", () => setMode("brief"));
    deepMode.addEventListener("click", () => setMode("deep"));

    feedbackBtn.addEventListener("click", async () => {
      const message = prompt(
        currentLang === "zh" ? "请输入你的反馈意见：" : "Please enter your feedback:"
      );

      if (!message || !message.trim()) return;

      const email = prompt(
        currentLang === "zh"
          ? "可选：留下邮箱便于回复（可留空）"
          : "Optional: leave your email for follow-up (can be empty)"
      ) || "";

      try {
        await fetch("/api/feedback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: message.trim(),
            email: email.trim()
          })
        });

        await typeAI(
          currentLang === "zh"
            ? "【历史背景】\n伦敦公共服务文化一直重视反馈循环。\n\n【社会语境】\n你的使用意见会帮助系统更贴近真实场景。\n\n【当代变化】\n现在反馈已提交到后台管理系统，可用于后续优化。\n\n【具体案例】\n你刚刚提交的内容，管理员已可在反馈管理页面查看。"
            : "[Historical Background]\nPublic-service culture values feedback loops.\n\n[Social Context]\nYour input helps improve real-world usability.\n\n[Contemporary Change]\nYour feedback has been submitted to the admin system.\n\n[Concrete Example]\nAn administrator can now review it in the feedback management panel."
        );
      } catch (e) {
        await typeAI(
          currentLang === "zh"
            ? "【历史背景】\n反馈机制依赖后端接口保持在线可用。\n\n【社会语境】\n当前前端页面仍可正常使用，但反馈通道暂时不可达。\n\n【当代变化】\n请稍后重试，或联系管理员检查服务状态。\n\n【具体案例】\n后台恢复后，你的反馈可在管理端查看。"
            : "[Historical Background]\nFeedback submission depends on backend API availability.\n\n[Social Context]\nThe front-end remains usable, but the feedback channel is temporarily unreachable.\n\n[Contemporary Change]\nPlease retry shortly or ask the admin to check service health.\n\n[Concrete Example]\nOnce restored, your message will appear in the admin panel."
        );
      }
    });

    langToggle.addEventListener("click", () => {
      postEvent("lang_switch", {
        from: currentLang,
        to: currentLang === "zh" ? "en" : "zh"
      });
      setLanguage(currentLang === "zh" ? "en" : "zh");
    });

    setLanguage("zh");
    setMode("deep");

    window.addEventListener("load", () => {
      postEvent("page_view", { page: "/" });
      postEvent("user_visit", { ua: navigator.userAgent });
      typeAI(UI_TEXT[currentLang].welcome);
    });
  </script>
</body>
</html>
